<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <rect width="180" height="180" rx="38" fill="#06091A"/>
  <defs>
    <linearGradient id="ga" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#F9E068"/>
      <stop offset="25%"  stop-color="#C8940A"/>
      <stop offset="50%"  stop-color="#F0C840"/>
      <stop offset="75%"  stop-color="#9A7000"/>
      <stop offset="100%" stop-color="#C8940A"/>
    </linearGradient>
    <linearGradient id="gb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#9A7000"/>
      <stop offset="40%"  stop-color="#F0C840"/>
      <stop offset="100%" stop-color="#9A7000"/>
    </linearGradient>
  </defs>
  <!-- Trophy scaled to 180x180 canvas with padding -->
  <g transform="translate(36,22) scale(1.35)">
    <!-- Globe -->
    <circle cx="40" cy="20" r="18" fill="url(#ga)"/>
    <path d="M30,10 C27,14 26,19 28,24 C30,29 29,32 27,35" stroke="rgba(255,255,255,0.28)" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <path d="M42,7 C46,11 47,17 44,22 C42,27 43,31 41,35"  stroke="rgba(255,255,255,0.28)" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <path d="M48,12 C52,15 52,21 49,25" stroke="rgba(255,255,255,0.18)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Left wing -->
    <path d="M26,56 C8,50 3,34 14,16 C17,10 25,9 27,16 C24,22 22,36 24,52 Z" fill="url(#ga)"/>
    <!-- Right wing -->
    <path d="M54,56 C72,50 77,34 66,16 C63,10 55,9 53,16 C56,22 58,36 56,52 Z" fill="url(#ga)"/>
    <!-- Body -->
    <path d="M26,56 C22,64 22,74 26,80 L54,80 C58,74 58,64 54,56 C48,50 32,50 26,56 Z" fill="url(#ga)"/>
    <!-- Figure head -->
    <circle cx="40" cy="54" r="5" fill="url(#ga)"/>
    <!-- Stem -->
    <rect x="34" y="80" width="12" height="12" rx="2" fill="url(#gb)"/>
    <!-- Base 1 -->
    <path d="M28,92 L26,100 L54,100 L52,92 Z" fill="url(#gb)"/>
    <line x1="29" y1="96" x2="51" y2="96" stroke="rgba(255,255,255,0.22)" stroke-width="0.8"/>
    <!-- Base 2 -->
    <path d="M22,100 L19,110 L61,110 L58,100 Z" fill="url(#ga)"/>
    <line x1="24" y1="105" x2="56" y2="105" stroke="rgba(255,255,255,0.18)" stroke-width="0.7"/>
    <!-- Sheen -->
    <path d="M27,10 C24,15 24,22 27,28" stroke="rgba(255,255,255,0.45)" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
</svg>
