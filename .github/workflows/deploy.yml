name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VITE_FD_API_KEY: ${{ secrets.FD_API_KEY }}
          VITE_ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Deploy to gh-pages (preserve existing files)
        run: npx gh-pages -d dist --add --message "Deploy [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
