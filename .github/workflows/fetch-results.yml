name: Fetch WM Results

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Fetch results from football-data.org
        run: |
          HTTP=$(curl -s -w "%{http_code}" -o matches_raw.json \
            -H "X-Auth-Token: ${{ secrets.FD_API_KEY }}" \
            "https://api.football-data.org/v4/competitions/WC/matches")
          echo "HTTP status: $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "API error $HTTP, skipping"
            exit 0
          fi
          echo "Matches received: $(python3 -c "import json; print(len(json.load(open('matches_raw.json'))['matches']))")"

      - name: Process and slim down JSON
        run: |
          python3 << 'PYEOF'
          import json, datetime, sys, os

          if not os.path.exists('matches_raw.json'):
              print("No matches_raw.json, skipping")
              sys.exit(0)

          with open('matches_raw.json') as f:
              raw = json.load(f)

          out = []
          for m in raw.get('matches', []):
              status = m.get('status', '')
              if status not in ('IN_PLAY', 'PAUSED', 'FINISHED', 'AWARDED'):
                  continue
              out.append({
                  'id': m['id'],
                  'status': status,
                  'homeTeam': {'tla': m['homeTeam']['tla'], 'name': m['homeTeam']['name']},
                  'awayTeam': {'tla': m['awayTeam']['tla'], 'name': m['awayTeam']['name']},
                  'score': m['score'],
                  'goals': m.get('goals', []),
              })

          result = {
              'matches': out,
              'updatedAt': datetime.datetime.utcnow().isoformat() + 'Z'
          }
          with open('results_slim.json', 'w') as f:
              json.dump(result, f)
          print(f"Processed {len(out)} active/finished matches")
          PYEOF

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-dir

      - name: Write results.json
        run: |
          if [ ! -f results_slim.json ]; then
            echo "No results_slim.json, skipping"
            exit 0
          fi
          mkdir -p gh-pages-dir/data
          cp results_slim.json gh-pages-dir/data/results.json

      - name: Commit and push
        run: |
          cd gh-pages-dir
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/results.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update WM results [skip ci]"
            git push
          fi
